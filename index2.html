// Weight / experience option values are stored as canonical English keys so the
// matching logic never depends on the chosen language.
const WEIGHT_KEYS = ["w1","w2","w3"];
const EXPERIENCE_KEYS = ["e1","e2","e3","e4"];

function weightClass(key) {
  if (key === "w1") return "<50";
  if (key === "w2") return "<70";
  return ">70";
}
function experienceClass(key) {
  if (key === "e1" || key === "e2") return "Beginner";
  if (key === "e3") return "Intermediate";
  return "Advanced";
}
const EXP_RANK = { Beginner: 0, Intermediate: 1, Advanced: 2 };

function matchHorses(riders) {
  return riders.map(r => {
    const ec = experienceClass(r.experience);
    return HORSES.filter(h => {
      const wMap = { "<50": 50, "<70": 70, ">70": 200 };
      const rMap = { "w1": 49, "w2": 65, "w3": 80 };
      const horseMax = wMap[h.weightClass];
      const riderWeight = rMap[r.weight];
      return riderWeight <= horseMax && EXP_RANK[h.experience] <= EXP_RANK[ec];
    });
  });
}
function getSharedAvailableDates(selectedHorseIds) {
  if (!selectedHorseIds.length) return [];
  const sets = selectedHorseIds.map(id => new Set(HORSES.find(h => h.id === id)?.available || []));
  return [...sets[0]].filter(d => sets.every(s => s.has(d)));
}

// ─── HELPERS ────────────────────────────────────────────────────────────────

function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }
function getFirstDay(year, month) { return new Date(year, month, 1).getDay(); }
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_NAMES = ["Su","Mo","Tu","We","Th","Fr","Sa"];

// Build the WhatsApp message that lands in Simone's inbox (always English).
function buildWhatsAppMessage({ actObj, durationLabel, formattedDate, selectedTime, numPeople, matches, notes }) {
  const lines = [];
  lines.push("🐴 *New booking request — Salty Cowboys*");
  lines.push("");
  if (actObj) lines.push("Activity: " + T.en.activities[actObj.id] + (durationLabel ? " (" + durationLabel + ")" : ""));
  if (formattedDate) lines.push("Date & time: " + formattedDate + (selectedTime ? " · " + selectedTime : ""));
  lines.push("Group size: " + numPeople);
  lines.push("");
  lines.push("*Riders:*");
  matches.forEach((m, i) => {
    const r = m.rider;
    const ageNum = parseInt(r.age, 10);
    const parts = [];
    const who = (r.name && r.name.trim()) ? r.name.trim() : ("Rider " + (i + 1));
    let line = "• " + who;
    if (r.age) line += ", age " + r.age;
    parts.push(T.en[r.experience]); // experience label in English
    if (!actObj?.offSaddle && r.weight) parts.push(T.en[r.weight]);
    line += " — " + parts.join(", ");
    if (m.horse) line += " → suggested: " + m.horse.emoji + " " + m.horse.name;
    if (!isNaN(ageNum) && ageNum < 18) line += " (parent/guardian permission confirmed)";
    lines.push(line);
  });
  lines.push("");
  lines.push("Notes: " + (notes && notes.trim() ? notes.trim() : "—"));
  lines.push("");
  lines.push("_Sent from the online booking page · pending Simone's approval_");
  return lines.join("\n");
}

function openWhatsApp(message) {
  const url = "https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

// ─── MAIN COMPONENT ──────────────────────────────────────────────────────────

function App() {
  const [lang, setLang] = useState("en");
  const t = T[lang];

  const [screen, setScreen] = useState("activity"); // activity | riders | calendar | confirm
  const [activity, setActivity] = useState(null);
  const [duration, setDuration] = useState(null);
  const [numPeople, setNumPeople] = useState(null);
  const [riders, setRiders] = useState([]);
  const [calMonth, setCalMonth] = useState(4); // May (0-indexed)
  const [calYear, setCalYear] = useState(2026);
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedTime, setSelectedTime] = useState(null);
  const [horseMatches, setHorseMatches] = useState([]);
  const [availableDates, setAvailableDates] = useState([]);
  const [notes, setNotes] = useState("");

  const actObj = ALL_ACTIVITIES.find(a => a.id === activity);
  const isOffSaddle = actObj?.offSaddle === true;

  useEffect(() => {
    if (riders.length && riders.every(r => r.weight && r.experience)) {
      const riderMatches = matchHorses(riders);
      const assigned = [];
      const usedIds = new Set();
      let possible = true;
      for (let i = 0; i < riderMatches.length; i++) {
        const avail = riderMatches[i].filter(h => !usedIds.has(h.id));
        if (!avail.length) { possible = false; break; }
        assigned.push({ rider: riders[i], horse: avail[0] });
        usedIds.add(avail[0].id);
      }
      if (possible) {
        setHorseMatches(assigned);
        setAvailableDates(getSharedAvailableDates(assigned.map(a => a.horse.id)));
      } else {
        setHorseMatches([]);
        setAvailableDates([]);
      }
    } else {
      setHorseMatches([]);
      setAvailableDates([]);
    }
  }, [riders]);

  function initRiders(n) {
    const count = n === "5+" ? 5 : parseInt(n);
    setRiders(Array.from({ length: count }, (_, i) => ({
      id: i,
      label: count === 1 ? t.rider : t.rider + " " + (i + 1),
      name: "", age: "", permission: false,
      weight: "", experience: "",
    })));
    setNumPeople(n);
  }
  function updateRider(idx, field, val) {
    setRiders(prev => prev.map((r, i) => i === idx ? { ...r, [field]: val } : r));
  }

  function resetAll() {
    setScreen("activity"); setActivity(null); setDuration(null);
    setNumPeople(null); setRiders([]); setSelectedDate(null);
    setSelectedTime(null); setHorseMatches([]); setNotes("");
  }

  const step = screen === "activity" ? 1 : screen === "riders" ? 2 : screen === "calendar" ? 3 : 4;

  const ridersComplete = riders.length > 0 && riders.every(r => {
    const ageNum = parseInt(r.age, 10);
    const ageOk = r.age !== "" && !isNaN(ageNum) && ageNum > 0 && ageNum < 120;
    const minorOk = isNaN(ageNum) || ageNum >= 18 || r.permission;
    return r.name.trim() && ageOk && (isOffSaddle || r.weight) && r.experience && minorOk;
  });

  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDay(calYear, calMonth);
  const availableSet = new Set(availableDates);
  function handleDayClick(day) {
    if (!availableSet.has(day)) return;
    setSelectedDate(day);
    setSelectedTime(null);
  }

  const formattedDate = selectedDate ? MONTHS[calMonth] + " " + selectedDate + ", " + calYear : null;

  function handleSend() {
    const message = buildWhatsAppMessage({
      actObj, durationLabel: duration, formattedDate, selectedTime,
      numPeople, matches: horseMatches, notes,
    });
    openWhatsApp(message);
    setScreen("confirm");
  }

  function handleNoAvailWhatsApp() {
    const message = buildWhatsAppMessage({
      actObj, durationLabel: duration, formattedDate: null, selectedTime: null,
      numPeople, matches: horseMatches.length ? horseMatches : riders.map(r => ({ rider: r, horse: null })),
      notes,
    }) + "\n\n(Couldn't find availability online — please advise.)";
    openWhatsApp(message);
  }

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="hero">
          <div className="lang-switch">
            {LANGS.map(l => (
              <button
                key={l.code}
                className={"lang-btn " + (lang === l.code ? "active" : "")}
                onClick={() => setLang(l.code)}
              >{l.label}</button>
            ))}
          </div>
          <div className="hero-eyebrow">Salty Cowboys · Bali</div>
          <div className="hero-title">{t.heroTitle1}<br />{t.heroTitle2}</div>
          <div className="hero-sub">{t.heroSub}</div>
        </div>

        {screen !== "confirm" && (
          <div className="steps">
            {[1, 2, 3].map((s, i) => (
              <React.Fragment key={s}>
                <div className={"step-dot " + (step > s ? "done" : step === s ? "active" : "")}>
                  {step > s ? "✓" : s}
                </div>
                {i < 2 && <div className={"step-line " + (step > s ? "done" : "")} />}
              </React.Fragment>
            ))}
          </div>
        )}

        {/* ── ACTIVITY ── */}
        {screen === "activity" && (
          <div className="body fu">
            <h2 className="section-title">{t.chooseActivity}</h2>
            <p className="section-hint">{t.chooseActivityHint}</p>
            {ACTIVITIES.map(cat => (
              <div key={cat.category}>
                <div className="act-category">{t.categories[cat.category]}</div>
                {cat.items.map(item => (
                  <div
                    key={item.id}
                    className={"act-card " + (activity === item.id ? "selected" : "")}
                    onClick={() => { setActivity(item.id); setDuration(null); }}
                  >
                    <div className="act-icon">{item.icon}</div>
                    <div>
                      <div className="act-name">{t.activities[item.id]}</div>
                      <div className="act-meta">{item.slots.join(" · ")} · {item.durations.join(", ")}</div>
                    </div>
                    <div className="act-check">✓</div>
                  </div>
                ))}
              </div>
            ))}
            {activity && (
              <div className="fu2">
                <div className="act-category" style={{ marginTop: 20 }}>{t.duration}</div>
                <div className="pill-row">
                  {actObj.durations.map(d => (
                    <button key={d} className={"pill " + (duration === d ? "selected" : "")} onClick={() => setDuration(d)}>{d}</button>
                  ))}
                </div>
              </div>
            )}
            {activity && duration && (
              <div className="fu3">
                <div className="act-category">{t.numPeople}</div>
                <div className="pill-row">
                  {PEOPLE_OPTIONS.map(n => (
                    <button key={n} className={"pill " + (numPeople === n ? "selected" : "")} onClick={() => initRiders(n)}>{n}</button>
                  ))}
                </div>
              </div>
            )}
            {activity && duration && numPeople && (
              <button className="cta fu4" onClick={() => setScreen("riders")}>{t.continue}</button>
            )}
          </div>
        )}

        {/* ── RIDERS ── */}
        {screen === "riders" && (
          <div className="body fu">
            <div className="back-link" onClick={() => setScreen("activity")}>{t.back}</div>
            <h2 className="section-title">{riders.length === 1 ? t.aboutYou : t.aboutRiders}</h2>
            <p className="section-hint">
              {t.matchHint}{riders.length > 1 ? " " + riders.length + " · " + t.activities[actObj?.id] : " " + t.activities[actObj?.id]}
            </p>
            {riders.map((rider, idx) => {
              const ageNum = parseInt(rider.age, 10);
              const isMinor = !isNaN(ageNum) && ageNum > 0 && ageNum < 18;
              return (
                <div key={rider.id} className="rider-card fu" style={{ animationDelay: (idx * 0.06) + "s" }}>
                  <div className="rider-label">{riders.length === 1 ? t.yourDetails : rider.label}</div>

                  <div className="rider-field">
                    <div className="field-2col">
                      <div>
                        <div className="field-label">{t.name}</div>
                        <input
                          className="text-input"
                          type="text"
                          value={rider.name}
                          placeholder={t.namePlaceholder}
                          onChange={e => updateRider(idx, "name", e.target.value)}
                        />
                      </div>
                      <div>
                        <div className="field-label">{t.age}</div>
                        <input
                          className="text-input"
                          type="number"
                          inputMode="numeric"
                          min="1"
                          value={rider.age}
                          placeholder={t.agePlaceholder}
                          onChange={e => updateRider(idx, "age", e.target.value)}
                        />
                      </div>
                    </div>
                    {isMinor && (
                      <div className="perm-row" onClick={() => updateRider(idx, "permission", !rider.permission)}>
                        <div className={"perm-box " + (rider.permission ? "checked" : "")}>{rider.permission ? "✓" : ""}</div>
                        <div className="perm-text">{t.permission}</div>
                      </div>
                    )}
                  </div>

                  {!isOffSaddle && (
                    <div className="rider-field">
                      <div className="field-label">{t.weight}</div>
                      <div className="field-pills">
                        {WEIGHT_KEYS.map(w => (
                          <button key={w} className={"field-pill " + (rider.weight === w ? "selected" : "")} onClick={() => updateRider(idx, "weight", w)}>{t[w]}</button>
                        ))}
                      </div>
                      {rider.weight === "w3" && (
                        <div className="weight-warning">
                          <div className="ww-header">
                            <div className="ww-icon">🐴</div>
                            <div>
                              <div className="ww-title">{t.wwTitle}</div>
                              <div className="ww-body">{t.wwBody}</div>
                            </div>
                          </div>
                          <div className="ww-acts">
                            <span className="ww-act-tag">{t.wwTag1}</span>
                            <span className="ww-act-tag">{t.wwTag2}</span>
                            <span className="ww-act-tag">{t.wwTag3}</span>
                          </div>
                          <button className="ww-btn" onClick={() => { resetAll(); }}>{t.wwBtn}</button>
                        </div>
                      )}
                    </div>
                  )}

                  <div className="rider-field">
                    <div className="field-label">{t.experience}</div>
                    <div className="field-pills">
                      {EXPERIENCE_KEYS.map(e => (
                        <button key={e} className={"field-pill " + (rider.experience === e ? "selected" : "")} onClick={() => updateRider(idx, "experience", e)}>{t[e]}</button>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
            <button className="cta" disabled={!ridersComplete} onClick={() => setScreen("calendar")}>{t.seeAvailability}</button>
          </div>
        )}

        {/* ── CALENDAR ── */}
        {screen === "calendar" && (
          <div className="fu">
            <div className="back-link" style={{ padding: "16px 24px 0" }} onClick={() => setScreen("riders")}>{t.back}</div>
            <div className="cal-header">
              <button className="cal-nav" onClick={() => {
                if (calMonth === 0) { setCalMonth(11); setCalYear(y => y - 1); } else setCalMonth(m => m - 1);
              }}>‹</button>
              <div className="cal-month">{MONTHS[calMonth]} {calYear}</div>
              <button className="cal-nav" onClick={() => {
                if (calMonth === 11) { setCalMonth(0); setCalYear(y => y + 1); } else setCalMonth(m => m + 1);
              }}>›</button>
            </div>
            <div className="cal-grid">
              <div className="cal-days-header">
                {DAY_NAMES.map(d => <div key={d} className="cal-day-name">{d}</div>)}
              </div>
              <div className="cal-days">
                {Array.from({ length: firstDay }).map((_, i) => <div key={"e" + i} className="cal-day" />)}
                {Array.from({ length: daysInMonth }).map((_, i) => {
                  const day = i + 1;
                  const isAvail = availableSet.has(day);
                  const isSel = selectedDate === day;
                  return (
                    <div key={day} className={"cal-day " + (isAvail ? "available" : "") + " " + (isSel ? "selected" : "")} onClick={() => handleDayClick(day)}>{day}</div>
                  );
                })}
              </div>
            </div>
            <div className="cal-legend">
              <div className="legend-item"><div className="legend-dot" style={{ background: "rgba(200,120,74,0.4)", border: "1px solid rgba(200,120,74,0.5)" }} />{t.available}</div>
              <div className="legend-item"><div className="legend-dot" style={{ background: "var(--clay)" }} />{t.selected}</div>
              <div className="legend-item"><div className="legend-dot" style={{ background: "rgba(245,237,224,0.08)" }} />{t.unavailable}</div>
            </div>

            {availableDates.length === 0 && (
              <div className="no-avail-modal">
                <div className="no-avail-top">
                  <div className="no-avail-icon">🗓️</div>
                  <div>
                    <div className="no-avail-title">{t.noAvailTitle}</div>
                    <div className="no-avail-body">{t.noAvailBody}</div>
                  </div>
                </div>
                <button className="wa-btn" onClick={handleNoAvailWhatsApp}>
                  <span className="wa-icon">💬</span>{t.waBtn}
                </button>
              </div>
            )}

            <div className="cal-selection-panel">
              {availableDates.length > 0 && !selectedDate && (
                <p style={{ fontSize: 13, color: "var(--dusk)", lineHeight: 1.6 }}>{t.pickDate}</p>
              )}
              {selectedDate && (
                <>
                  <div className="sel-title">{MONTHS[calMonth]} {selectedDate}</div>
                  <div className="act-category" style={{ marginTop: 0, marginBottom: 10 }}>{t.timeSlot}</div>
                  <div className="time-cards">
                    {actObj.slots.map(slot => (
                      <div key={slot} className={"time-card " + (selectedTime === slot ? "selected" : "")} onClick={() => setSelectedTime(slot)}>
                        <div className="time-main">{slot}</div>
                        <div className="time-sub">{actObj.durations.length === 1 && actObj.durations[0] === "10hr" ? t.fullDay : duration}</div>
                      </div>
                    ))}
                  </div>
                  {horseMatches.length > 0 && (
                    <div className="match-preview fu2">
                      <div className="match-preview-title">{t.matchedHorses}</div>
                      {horseMatches.map((m, i) => (
                        <div key={i} className="match-row">
                          <div className="match-horse-avatar" style={{ background: m.horse.color + "22" }}>{m.horse.emoji}</div>
                          <div className="match-info">
                            <div className="match-horse-name">{m.horse.name}</div>
                            <div className="match-rider-name">{(m.rider.name && m.rider.name.trim()) || m.rider.label} · {t[m.rider.experience]}</div>
                          </div>
                          {!isOffSaddle && m.rider.weight && <div className="match-tag">{t[m.rider.weight]}</div>}
                        </div>
                      ))}
                    </div>
                  )}

                  <div className="act-category" style={{ marginTop: 0 }}>{t.notesLabel}</div>
                  <textarea
                    className="notes-area"
                    value={notes}
                    placeholder={t.notesPlaceholder}
                    onChange={e => setNotes(e.target.value)}
                  />

                  <div className="notice">
                    <span>🌿</span>
                    <span>{t.notice}</span>
                  </div>
                  <button className="cta" disabled={!selectedTime} onClick={handleSend}>{t.sendBtn}</button>
                </>
              )}
            </div>
          </div>
        )}

        {/* ── CONFIRM ── */}
        {screen === "confirm" && (
          <div className="confirm-screen fu">
            <div className="confirm-icon">🌺</div>
            <h2 className="confirm-title">{t.sentTitle1}<br />{t.sentTitle2}</h2>
            <p className="confirm-sub">{t.sentSub}</p>
            <div className="confirm-summary">
              <div className="sum-row"><span className="sum-key">{t.sActivity}</span><span className="sum-val">{t.activities[actObj?.id]}</span></div>
              <div className="sum-row"><span className="sum-key">{t.sDuration}</span><span className="sum-val">{duration}</span></div>
              <div className="sum-row"><span className="sum-key">{t.sDateTime}</span><span className="sum-val">{formattedDate} · {selectedTime}</span></div>
              <div className="sum-row"><span className="sum-key">{t.sRiders}</span><span className="sum-val">{numPeople} {numPeople === "1" ? t.person : t.people}</span></div>
              {horseMatches.map((m, i) => (
                <div key={i} className="sum-row">
                  <span className="sum-key">{(m.rider.name && m.rider.name.trim()) || m.rider.label}</span>
                  <span className="sum-val">{m.horse.emoji} {m.horse.name} {t.pending}</span>
                </div>
              ))}
              <div className="sum-row"><span className="sum-key">{t.sStatus}</span><span className="sum-val" style={{ color: "#c8784a" }}>{t.awaiting}</span></div>
            </div>
            <button className="cta" onClick={resetAll}>{t.another}</button>
          </div>
        )}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const loadingEl = document.getElementById('loading');
if (loadingEl) {
  requestAnimationFrame(() => {
    loadingEl.style.transition = 'opacity 0.3s';
    loadingEl.style.opacity = '0';
    setTimeout(() => loadingEl.remove(), 320);
  });
}
  </script>
</body>
</html>
