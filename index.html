  experience: "Intermediate",
  color: "#9a6b4b",
  available: [1, 3, 5, 6, 8, 9, 12, 13, 15, 16, 20, 21, 23, 24]

const ACTIVITIES = [{
  category: "Rides",
  items: [{
    id: "beach",
    name: "Beach & Ricefield Ride",
    icon: "🌊",
    durations: ["1hr", "1.5hr", "2hr"],

  }]
}, {
  category: "Photoshoots",
  items: [{
    id: "photo",

    icon: "📸",
    durations: ["1hr", "1.5hr", "2hr"],

  }]
}, {
  category: "Off Saddle Activities",
  items: [{
    id: "whisper",
    name: "Horse Whisperer Course",
    icon: "🤝",
    durations: ["10hr"],
    slots: ["8:00am", "5:00pm"],
    experienceNeeded: "Beginner",
    offSaddle: true
  }, {
    id: "joinup",
    name: "Join Up Lesson",
    icon: "🔄",
    durations: ["50min"],
    slots: ["8:00am", "5:00pm"],
    experienceNeeded: "Beginner",
    offSaddle: true
  }, {
    id: "lunge",
    name: "Lunge Lesson",
    icon: "🎯",
    durations: ["50min"],
    slots: ["8:00am", "5:00pm"],
    experienceNeeded: "Intermediate",
    offSaddle: true
  }]
}];
const ALL_ACTIVITIES = ACTIVITIES.flatMap(c => c.items);
const WEIGHT_OPTIONS = ["Under 50 kg", "50–70 kg", "Over 70 kg"];
const EXPERIENCE_OPTIONS = ["Never ridden", "Beginner", "Intermediate", "Advanced"];
const PEOPLE_OPTIONS = ["1", "2", "3", "4", "5+"];
function weightClass(label) {
  if (label === "Under 50 kg") return "<50";
  if (label === "50–70 kg") return "<70";
  return ">70";
}
function experienceClass(label) {
  if (label === "Never ridden" || label === "Beginner") return "Beginner";
  if (label === "Intermediate") return "Intermediate";
  return "Advanced";
}
const EXP_RANK = {
  Beginner: 0,
  Intermediate: 1,
  Advanced: 2
};
function matchHorses(riders) {
  // For each rider, find compatible horses; return best set covering all riders
  const riderMatches = riders.map(r => {
    const wc = weightClass(r.weight);
    const ec = experienceClass(r.experience);
    return HORSES.filter(h => {
      const weightOk = h.weightClass === wc || wc === "<70" && h.weightClass === ">70" || wc === "<50" && (h.weightClass === "<70" || h.weightClass === ">70");
      const expOk = EXP_RANK[h.experience] >= EXP_RANK[ec] || h.experience === ec;
      // simpler: horse can carry rider if horse.weightClass covers them
      const wMap = {
        "<50": 50,
        "<70": 70,
        ">70": 200
      };
      const rMap = {
        "Under 50 kg": 49,
        "50–70 kg": 65,
        "Over 70 kg": 80
      };
      const horseMax = wMap[h.weightClass];
      const riderWeight = rMap[r.weight];
      return riderWeight <= horseMax && EXP_RANK[h.experience] <= EXP_RANK[ec];
    });
  });
  return riderMatches;
}
function getSharedAvailableDates(selectedHorseIds) {
  if (!selectedHorseIds.length) return [];
  const sets = selectedHorseIds.map(id => new Set(HORSES.find(h => h.id === id)?.available || []));
  const shared = [...sets[0]].filter(d => sets.every(s => s.has(d)));
  return shared;
}

.ww-btn {

  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;

  justify-content: center;
  gap: 8px;

.wa-btn:hover { background: #1ebe5a; }
.wa-icon { font-size: 18px; }
